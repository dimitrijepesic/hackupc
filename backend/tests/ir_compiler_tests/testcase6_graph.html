<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>testcase6 — Call Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: 'Consolas', 'Monaco', monospace; }
  svg { display: block; width: 100vw; height: 100vh; }
  .node-circle { cursor: pointer; transition: r 0.15s; }
  .node-circle:hover { r: 22; }
  .node-label { font-size: 11px; fill: #c9d1d9; pointer-events: none; }
  .edge-line { stroke-opacity: 0.45; }
  .edge-arrow { fill-opacity: 0.55; }
  .self-loop { fill: none; stroke-opacity: 0.45; }
  .legend { font-size: 12px; fill: #8b949e; }
  .legend-dot { r: 6; }
  .title { font-size: 15px; fill: #e6edf3; font-weight: bold; }
  .subtitle { font-size: 11px; fill: #8b949e; }
</style>
</head>
<body>
<svg id="graph" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-animal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7ee787" />
    </marker>
    <marker id="arrow-shelter" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#79c0ff" />
    </marker>
    <marker id="arrow-test" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d2a8ff" />
    </marker>
    <marker id="arrow-cross" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffa657" />
    </marker>
    <marker id="arrow-recurse" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f85149" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="30" class="title">animal-shelter — Call Graph</text>
  <text x="30" y="48" class="subtitle">18 nodes, 23 edges | from testcase6_output.json</text>

  <!-- Legend -->
  <g transform="translate(30, 70)">
    <circle cx="0" cy="0" class="legend-dot" fill="#7ee787" /><text x="12" y="4" class="legend">Animal.swift (source)</text>
    <circle cx="0" cy="20" class="legend-dot" fill="#79c0ff" /><text x="12" y="24" class="legend">Shelter.swift (source)</text>
    <circle cx="0" cy="40" class="legend-dot" fill="#d2a8ff" /><text x="12" y="44" class="legend">ShelterTests (test)</text>
    <circle cx="200" cy="0" class="legend-dot" fill="#f85149" /><text x="212" y="4" class="legend">self-loop (recursion)</text>
    <circle cx="200" cy="20" class="legend-dot" fill="#ffa657" /><text x="212" y="24" class="legend">cross-file edge</text>
    <text x="200" y="44" class="legend">throws = dashed border</text>
  </g>

  <!-- ═══════════════ EDGES ═══════════════ -->
  <g id="edges">
    <!-- Dog.fetch ↔ Dog.run (mutual recursion cycle) -->
    <line x1="340" y1="310" x2="340" y2="400" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />
    <line x1="350" y1="400" x2="350" y2="310" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- Dog.fetch → Dog.speak -->
    <line x1="320" y1="290" x2="250" y2="230" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- Cat.speak → Cat.purr -->
    <line x1="160" y1="320" x2="100" y2="390" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- GuideDog.guide → Dog.speak -->
    <line x1="470" y1="260" x2="270" y2="220" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- GuideDog.guide → GuideDog.eat -->
    <line x1="490" y1="280" x2="530" y2="370" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- GuideDog.guide → Dog.run -->
    <line x1="460" y1="280" x2="365" y2="400" stroke="#7ee787" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-animal)" />

    <!-- GuideDog.eat → Animal.eat -->
    <line x1="520" y1="390" x2="170" y2="170" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- Shelter.run → Shelter.processAll -->
    <line x1="690" y1="230" x2="730" y2="330" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- Shelter.adopt → Animal.speak -->
    <line x1="830" y1="220" x2="160" y2="170" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- Shelter.adopt → AdoptionError.init -->
    <line x1="870" y1="200" x2="920" y2="150" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- Shelter.adopt → Animal.eat -->
    <line x1="830" y1="230" x2="175" y2="180" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- Shelter.adopt → Shelter.log -->
    <line x1="880" y1="240" x2="920" y2="320" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- Shelter.processAll → Shelter.adopt -->
    <line x1="750" y1="330" x2="850" y2="230" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- Shelter.processAll → Shelter.processAll (SELF-LOOP) -->
    <path d="M 715,330 C 680,280 680,380 715,345" stroke="#f85149" stroke-width="2" class="self-loop" marker-end="url(#arrow-recurse)" />

    <!-- rescue → Shelter.adopt -->
    <line x1="770" y1="470" x2="855" y2="245" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- rescue → Animal.speak -->
    <line x1="740" y1="470" x2="155" y2="175" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- rescue → Shelter.run -->
    <line x1="755" y1="460" x2="695" y2="240" stroke="#79c0ff" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-shelter)" />

    <!-- testAdopt → Shelter.adopt -->
    <line x1="960" y1="460" x2="880" y2="245" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- testGuideDog → GuideDog.guide -->
    <line x1="540" y1="520" x2="485" y2="280" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- testGuideDog → Dog.fetch -->
    <line x1="520" y1="510" x2="345" y2="305" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- testGuideDog → Dog.run -->
    <line x1="530" y1="530" x2="355" y2="415" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />

    <!-- testRescue → rescue -->
    <line x1="820" y1="560" x2="765" y2="490" stroke="#ffa657" stroke-width="1.5" class="edge-line" marker-end="url(#arrow-cross)" />
  </g>

  <!-- ═══════════════ NODES ═══════════════ -->
  <g id="nodes">
    <!-- ── Animal cluster ── -->
    <circle cx="150" cy="165" r="18" fill="#238636" class="node-circle" />
    <text x="150" y="145" text-anchor="middle" class="node-label">Animal.speak</text>
    <text x="150" y="195" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:2 out:0</text>

    <circle cx="170" cy="270" r="14" fill="#238636" class="node-circle" />
    <text x="170" y="252" text-anchor="middle" class="node-label">Animal.eat</text>
    <text x="170" y="296" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:2 out:0</text>

    <!-- ── Dog cluster ── -->
    <circle cx="255" cy="215" r="16" fill="#2ea043" class="node-circle" />
    <text x="255" y="197" text-anchor="middle" class="node-label">Dog.speak</text>
    <text x="255" y="240" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:2 out:0</text>

    <circle cx="345" cy="295" r="16" fill="#2ea043" class="node-circle" />
    <text x="345" y="275" text-anchor="middle" class="node-label">Dog.fetch</text>
    <text x="345" y="320" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:2 out:2</text>

    <circle cx="345" cy="410" r="18" fill="#2ea043" class="node-circle" />
    <text x="345" y="438" text-anchor="middle" class="node-label">Dog.run</text>
    <text x="345" y="450" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:3 out:1</text>

    <!-- ── Cat cluster ── -->
    <circle cx="155" cy="325" r="14" fill="#196c2e" class="node-circle" />
    <text x="115" y="330" text-anchor="middle" class="node-label">Cat.speak</text>

    <circle cx="95" cy="400" r="12" fill="#196c2e" class="node-circle" />
    <text x="60" y="405" text-anchor="middle" class="node-label">Cat.purr</text>

    <!-- ── GuideDog cluster ── -->
    <circle cx="485" cy="265" r="18" fill="#3fb950" class="node-circle" />
    <text x="485" y="247" text-anchor="middle" class="node-label">GuideDog.guide</text>
    <text x="485" y="293" text-anchor="middle" style="font-size:9px;fill:#8b949e">in:1 out:3</text>

    <circle cx="535" cy="380" r="14" fill="#3fb950" class="node-circle" />
    <text x="575" y="385" text-anchor="middle" class="node-label">GuideDog.eat</text>

    <!-- ── Shelter cluster ── -->
    <circle cx="690" cy="225" r="14" fill="#1f6feb" class="node-circle" />
    <text x="660" y="210" text-anchor="middle" class="node-label">Shelter.run</text>

    <circle cx="860" cy="225" r="20" fill="#1f6feb" class="node-circle" stroke="#ffa657" stroke-width="2" stroke-dasharray="4,3" />
    <text x="860" y="205" text-anchor="middle" class="node-label">Shelter.adopt</text>
    <text x="860" y="255" text-anchor="middle" style="font-size:9px;fill:#ffa657">throws | in:3 out:4</text>

    <circle cx="730" cy="340" r="16" fill="#1f6feb" class="node-circle" />
    <text x="730" y="365" text-anchor="middle" class="node-label">Shelter.processAll</text>
    <text x="730" y="377" text-anchor="middle" style="font-size:9px;fill:#f85149">recursive</text>

    <circle cx="930" cy="325" r="12" fill="#1f6feb" class="node-circle" />
    <text x="965" y="330" text-anchor="middle" class="node-label">Shelter.log</text>

    <circle cx="930" cy="145" r="13" fill="#1f6feb" class="node-circle" />
    <text x="930" y="128" text-anchor="middle" class="node-label">AdoptionError.init</text>

    <!-- ── Free function ── -->
    <circle cx="760" cy="475" r="16" fill="#388bfd" class="node-circle" stroke="#ffa657" stroke-width="2" stroke-dasharray="4,3" />
    <text x="760" y="500" text-anchor="middle" class="node-label">rescue (free fn)</text>
    <text x="760" y="512" text-anchor="middle" style="font-size:9px;fill:#ffa657">throws</text>

    <!-- ── Test nodes ── -->
    <circle cx="960" cy="455" r="13" fill="#8957e5" class="node-circle" stroke="#ffa657" stroke-width="2" stroke-dasharray="4,3" />
    <text x="1000" y="460" text-anchor="middle" class="node-label">testAdopt</text>
    <text x="1000" y="472" text-anchor="middle" style="font-size:9px;fill:#ffa657">throws</text>

    <circle cx="540" cy="525" r="15" fill="#8957e5" class="node-circle" />
    <text x="540" y="550" text-anchor="middle" class="node-label">testGuideDog</text>

    <circle cx="830" cy="560" r="13" fill="#8957e5" class="node-circle" stroke="#ffa657" stroke-width="2" stroke-dasharray="4,3" />
    <text x="830" y="582" text-anchor="middle" class="node-label">testRescue</text>
    <text x="830" y="594" text-anchor="middle" style="font-size:9px;fill:#ffa657">throws</text>
  </g>
</svg>
</body>
</html>
