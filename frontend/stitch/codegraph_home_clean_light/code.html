<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CodeGraph - Import Project</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primary: "#4f46e5",
                "primary-hover": "#4338ca",
                surface: "#ffffff",
                "surface-variant": "#f9fafb",
                "on-surface": "#111827",
                "on-surface-variant": "#6b7280",
                outline: "#d1d5db",
                "outline-variant": "#e5e7eb",
              },
              fontFamily: {
                body: ["Inter", "sans-serif"],
              }
            },
          },
        }
      </script>
</head>
<body class="bg-gray-50 text-on-surface min-h-screen flex flex-col font-body antialiased selection:bg-primary/20 selection:text-primary">
<!-- TopNavBar -->
<header class="flex justify-between items-center w-full px-6 h-14 bg-white z-50 fixed top-0 border-b border-gray-100 shadow-[0px_2px_4px_rgba(0,0,0,0.05)]">
<div class="flex items-center gap-8">
<a class="text-xl font-black tracking-tighter text-black" href="#">CodeGraph</a>
<nav class="hidden md:flex items-center gap-6 font-['Inter'] text-sm font-medium tracking-tight">
<a class="text-indigo-600 border-b-2 border-indigo-600 pb-1" href="#">Dashboard</a>
<a class="text-gray-500 hover:text-indigo-600 transition-colors active:opacity-80 transition-all" href="#">Workspace</a>
<a class="text-gray-500 hover:text-indigo-600 transition-colors active:opacity-80 transition-all" href="#">Documentation</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="font-['Inter'] text-sm font-medium tracking-tight text-white bg-indigo-600 px-4 py-1.5 rounded-md hover:bg-indigo-700 active:opacity-80 transition-all">Deploy</button>
<button class="font-['Inter'] text-sm font-medium tracking-tight text-gray-700 bg-gray-100 px-4 py-1.5 rounded-md hover:bg-gray-200 active:opacity-80 transition-all">Share</button>
<div class="flex items-center gap-3 text-gray-500">
<button class="hover:text-indigo-600 transition-colors active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[20px]">notifications</span>
</button>
<button class="hover:text-indigo-600 transition-colors active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-16 px-4 md:px-6 relative z-10">
<div class="w-full max-w-2xl bg-white rounded-2xl p-8 md:p-12 flex flex-col gap-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 relative overflow-hidden">
<div class="flex flex-col gap-2 text-center">
<h1 class="text-3xl font-bold tracking-tight text-gray-900">Import Workspace</h1>
<p class="text-base text-gray-500 max-w-md mx-auto">Connect your repository to generate an interactive structural topology.</p>
</div>
<!-- Import Options Container -->
<div class="flex flex-col gap-6 w-full max-w-md mx-auto">
<!-- URL Input -->
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Repository URL</label>
<div class="relative flex items-center bg-white rounded-lg transition-all duration-200 border border-gray-300 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 shadow-sm">
<span class="material-symbols-outlined absolute left-4 text-gray-400">link</span>
<input class="w-full bg-transparent border-none text-gray-900 font-mono text-sm pl-12 pr-12 py-3.5 focus:ring-0 placeholder:text-gray-400" placeholder="https://github.com/username/repo" type="text"/>
<button class="absolute right-1.5 bg-indigo-600 text-white p-1.5 rounded-md hover:bg-indigo-700 transition-colors flex items-center justify-center active:scale-95">
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
<div class="flex items-center gap-4 text-gray-400 text-xs font-medium uppercase my-2">
<div class="h-px bg-gray-200 flex-grow"></div>
<span>or connect provider</span>
<div class="h-px bg-gray-200 flex-grow"></div>
</div>
<!-- GitHub Auth -->
<button class="w-full flex items-center justify-center gap-3 bg-gray-900 py-3.5 px-6 rounded-lg hover:bg-gray-800 transition-colors active:scale-95 shadow-sm">
<svg aria-hidden="true" class="w-5 h-5 fill-white" viewbox="0 0 24 24"><path clip-rule="evenodd" d="M12 2C6.477 2 2 6.463 2 11.97c0 4.404 2.865 8.14 6.839 9.458.5.092.682-.216.682-.48 0-.236-.008-.864-.013-1.695-2.782.602-3.369-1.337-3.369-1.337-.454-1.151-1.11-1.458-1.11-1.458-.908-.618.069-.606.069-.606 1.003.07 1.531 1.027 1.531 1.027.892 1.524 2.341 1.084 2.91.828.092-.643.35-1.083.636-1.332-2.22-.251-4.555-1.107-4.555-4.927 0-1.088.39-1.976 1.029-2.669-.103-.252-.446-1.266.098-2.631 0 0 .84-.268 2.75 1.022A9.606 9.606 0 0112 6.82c.85.004 1.705.114 2.504.336 1.909-1.29 2.747-1.022 2.747-1.022.546 1.365.202 2.379.1 2.631.64.693 1.028 1.581 1.028 2.669 0 3.83-2.339 4.673-4.565 4.919.359.307.678.915.678 1.846 0 1.332-.012 2.407-.012 2.734 0 .267.18.577.688.48C19.137 20.107 22 16.37 22 11.97 22 6.463 17.522 2 12 2z" fill-rule="evenodd"></path></svg>
<span class="text-sm font-medium text-white">Auth with GitHub</span>
</button>
<!-- Local Upload Area -->
<div class="mt-2 border-2 border-dashed border-gray-200 rounded-xl p-8 flex flex-col items-center justify-center gap-3 bg-gray-50 hover:bg-gray-100 hover:border-gray-300 transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 group-hover:text-indigo-600 transition-colors">
<span class="material-symbols-outlined">cloud_upload</span>
</div>
<div class="text-center">
<p class="text-sm font-medium text-gray-900 mb-1">Upload Files</p>
<p class="text-xs text-gray-500">Drag &amp; drop local codebase (.zip, .tar)</p>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-6 px-6 flex justify-between items-center bg-white border-t border-gray-100 text-xs font-medium text-gray-500 z-50">
<span>© 2024 CodeGraph Engineering</span>
<div class="flex gap-6">
<a class="hover:text-gray-900 transition-colors" href="#">API Status</a>
<a class="hover:text-gray-900 transition-colors" href="#">Privacy</a>
<a class="hover:text-gray-900 transition-colors" href="#">Terms</a>
<a class="hover:text-gray-900 transition-colors" href="#">Github</a>
</div>
</footer>
</body></html>
