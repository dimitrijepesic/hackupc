<style>
        .precision-shadow {
            box-shadow: 0px 2px 4px rgba(0,0,0,0.05);
        }
        .deep-ambient-shadow {
            box-shadow: 0px 12px 24px rgba(0,0,0,0.08);
        }

<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-margin">
<main class="w-full max-w-[400px]">
<!-- Brand Logo -->
<div class="text-center mb-xl">
<h1 class="font-display-md text-display-md tracking-tighter font-black text-on-background">CodeGraph</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-sm">Precision codebase intelligence.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-xl deep-ambient-shadow">
<h2 class="font-headline-md text-headline-md mb-md">Sign in to your account</h2>
<!-- Form -->
<form action="#" class="space-y-md" method="POST">
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email address</label>
<input autocomplete="email" class="w-full bg-surface-container-lowest border border-[#F5F5F7] rounded-DEFAULT px-md py-[10px] font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-transparent focus:ring-0 focus:shadow-[0_2px_4px_rgba(0,0,0,0.05),0_0_0_2px_#4f46e5] transition-shadow placeholder:text-outline" id="email" name="email" placeholder="developer@example.com" required="" type="email"/>
</div>
<!-- Password -->
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-indigo-600 transition-colors" href="#">Forgot password?</a>
</div>
<input autocomplete="current-password" class="w-full bg-surface-container-lowest border border-[#F5F5F7] rounded-DEFAULT px-md py-[10px] font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-transparent focus:ring-0 focus:shadow-[0_2px_4px_rgba(0,0,0,0.05),0_0_0_2px_#4f46e5] transition-shadow placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Sign In Button -->
<button class="w-full bg-black text-white hover:bg-indigo-600 font-label-md text-label-md rounded-DEFAULT py-[12px] px-md transition-colors flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="my-lg flex items-center">
<div class="flex-grow border-t border-[#F5F5F7]"></div>
<span class="mx-md font-label-sm text-label-sm text-outline">OR</span>
<div class="flex-grow border-t border-[#F5F5F7]"></div>
</div>
<!-- GitHub Button -->
<button class="w-full bg-surface-container-lowest border border-[#F5F5F7] text-on-surface hover:bg-[#FAFAFA] font-label-md text-label-md rounded-DEFAULT py-[12px] px-md transition-colors flex items-center justify-center gap-sm precision-shadow" type="button">
<svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                Continue with GitHub
            </button>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center mt-lg">
                Don't have an account? <a class="text-primary hover:text-indigo-600 transition-colors font-medium" href="#">Request access</a>
</p>
</div>
<!-- Footer / Legal -->
<div class="mt-xl text-center flex justify-center gap-md">
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
